name: JavaMentor CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: javamentor/package-lock.json

      - name: Install Dependencies
        run: |
          cd javamentor
          npm ci

      - name: Build Project
        run: |
          cd javamentor
          npm run build

  deploy-to-hosting:
    name: Deploy to Firebase Hosting
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: javamentor/package-lock.json

      - name: Install Dependencies
        run: |
          cd javamentor
          npm ci

      - name: Build Project
        run: |
          cd javamentor
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DECMENTOR_AI }}'
          projectId: javamentor-mock
          channelId: live
          entryPoint: javamentor
